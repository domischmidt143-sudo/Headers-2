<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Trackers Header</title>

<style>
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

*{
    box-sizing:border-box;
}

.header{

    width:520px;
    height:72px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#1f1f1f;

    border:3px solid #ff006b;
    border-radius:999px;

    color:#ff006b;

    font-family:system-ui,-apple-system,sans-serif;
    font-size:34px;
    font-weight:800;

    letter-spacing:10px;
    text-transform:uppercase;
}
</style>

</head>

<body>

<div class="header">
TRACKERS
</div>

</body>
</html>
</body>
</html>
