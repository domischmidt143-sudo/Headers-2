<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<style>
:root{
  --pink:#ff006b;
  --bg:#191919;
}

body{
  margin:0;
  background:var(--bg);
  display:flex;
  align-items:center;
  padding:23px;
  font-family:Inter, system-ui, sans-serif;
}

.header-wrapper{
  width: 100%;
  display: flex;
  justify-content: center;
  margin: 20px 0;
}

.header-pill{
  background: #ff006b;
  color: #000;
  padding: 15px 25px;
  border-radius: 19px;
  font-weight: 700;
  font-size: 25px;
  text-align: center;
  max-width: 90%;
}

.header-title{
  display:inline-block;
  background:var(--pink);
  color:#000;
  padding:17px 25px;
  border-radius:19px;
  font-size:27px;
  font-weight:700;
}
</style>
</head>

<body>
  <div class="header-wrapper">
    <div class="header-title">Trackers</div>
  </div>
</body>
</html>
